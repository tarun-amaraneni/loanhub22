{% extends 'base.html' %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">

<style>
.card-box {
    background: #ffffff;
    border-radius: 14px;
    padding: 25px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}
.header-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}
.header-bar h2 {
    font-size: 22px;
    font-weight: 600;
    color: #2C3F51;
}
.btn-add {
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    color: #fff;
    padding: 10px 18px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
}
.table-wrapper {
    overflow-x: auto;
    border-radius: 12px;
    border: 1px solid #e5e7eb;
}
table {
    width: 100%;
    border-collapse: collapse;
    min-width: 1000px;
}
thead {
    background-color: #354A5E;
    color: #fff;
}
th, td {
    padding: 10px 12px;
    border-bottom: 1px solid #e5e7eb;
    text-align: center;
}
input, select {
    width: 100%;
    padding: 7px 10px;
    border-radius: 6px;
    border: 1px solid #d1d5db;
}
.btn-delete {
    background: #dc2626;
    color: #fff;
    border: none;
    border-radius: 7px;
    padding: 6px 12px;
    cursor: pointer;
}
.btn-submit {
    margin-top: 20px;
    background: #15803d;
    color: #fff;
    padding: 10px 24px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    float: right;
}
.placeholder-text {
    color: #9ca3af;
    font-style: italic;
}
</style>

<form method="POST">
{% csrf_token %}

<div class="card-box">
    <div class="header-bar">
        <h2>Add Record</h2>
        <button type="button" class="btn-add" onclick="addPaymentRow()">➕ Add New</button>
    </div>

    <div class="table-wrapper">
        <table id="paymentTable">
            <thead>
                <tr>
                    <th>Mode</th>
                    <th>Gen No</th>
                    <th>Name</th>
                    <th>Loan ID</th>
                    <th>Loan Type</th>
                    <th>Amount</th>
                    <th>Cash</th>
                    <th>Bank1</th>
                    <th>Bank2</th>
                    <th>Adj</th>
                    <th>Date</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<button type="submit" class="btn-submit">💾 Submit</button>
</form>

<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
<script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>

<script>
function today() {
    return new Date().toISOString().split('T')[0];
}

/* ================= VALIDATION ================= */
function areAllRowsComplete() {
    let valid = true;

    $('#paymentTable tbody tr').each(function () {
        const $row = $(this);

        const mode = $row.find('.modeSelect').val();
        const gen = $row.find('.genInput').val().trim();
        const name = $row.find('.nameInput').val().trim();
        const loanType = $row.find('.loanType').val();
        const date = $row.find('input[type="date"]').val();

        let loanIdOk = true;

        if (mode === 'existing') {
            loanIdOk = !!$row.find('.loanSelect').val();
        }

        if (!mode || !gen || !name || !loanType || !date || !loanIdOk) {
            valid = false;
            return false;
        }
    });

    return valid;
}

/* ================= AUTOCOMPLETE ================= */
function setupAutocomplete($row) {
    const $gen = $row.find('.genInput');
    const $name = $row.find('.nameInput');

    $gen.autocomplete({
        source: function (req, res) {
            $.getJSON("/api/users-autocomplete/", { term: req.term }, function (data) {
                res($.map(data, function (item) {
                    return {
                        label: item.code + " - " + item.name,
                        value: item.code,
                        name: item.name
                    };
                }));
            });
        },
        minLength: 0,
        select: function (e, ui) {
            $gen.val(ui.item.value);
            $name.val(ui.item.name);
            loadActiveLoans($row);
            return false;
        }
    }).focus(function () {
        $(this).autocomplete("search", $(this).val());
    });

    $name.autocomplete({
        source: "/api/users-autocomplete/",
        minLength: 1,
        select: function (e, ui) {
            $name.val(ui.item.name);
            $gen.val(ui.item.code);
            loadActiveLoans($row);
            return false;
        }
    });
}

/* ================= AMOUNT ================= */
function recalcAmount($row) {
    const total =
        (+$row.find('.cash').val() || 0) +
        (+$row.find('.bank1').val() || 0) +
        (+$row.find('.bank2').val() || 0) +
        (+$row.find('.adj').val() || 0);
    $row.find('.amount').val(total);
}

/* ================= LOAD ACTIVE LOANS ================= */
function loadActiveLoans($row) {
    const genNo = $row.find('.genInput').val().trim();
    const $loanSelect = $row.find('.loanSelect');
    const $loanType = $row.find('.loanType');

    if (!genNo || !$loanSelect.length) return;

    $.getJSON("/api/active-loans/", { gen_no: genNo, table: 'payments' }, function (data) {
        $loanSelect.html('<option value="">-- Select Loan --</option>');
        data.forEach(function (loan) {
            $loanSelect.append(
                `<option value="${loan.code}" data-type="${loan.type}">
                    ${loan.code} (${loan.type})
                </option>`
            );
        });

        $loanSelect.off('change').on('change', function () {
            $loanType.val($(this).find(':selected').data('type') || '');
        });
    });


    $.getJSON("/api/active-loans/", { gen_no: genNo, table: 'payments' }, function (data) {
    $loanSelect.html('<option value="">-- Select Loan --</option>');
    data.forEach(function (loan) {
        $loanSelect.append(
            `<option value="${loan.code}" data-type="${loan.type}">
                ${loan.code} (${loan.type})
            </option>`
        );
    });

    // When loan is selected
    $loanSelect.off('change').on('change', function () {
        const selectedType = $(this).find(':selected').data('type') || '';
        $loanType.val(selectedType);

        if (selectedType) {
            // 🔒 disable loan type dropdown for existing loan
            $loanType.prop('disabled', true);
        } else {
            $loanType.prop('disabled', false);
        }
    });

    // If a loan is already pre-selected (like editing row)
    const preSelected = $loanSelect.val();
    if (preSelected) {
        $loanType.prop('disabled', true);
    }
});
}

/* ================= ADD ROW ================= */
function addPaymentRow() {

    if (!areAllRowsComplete()) {
        alert("Please fill all fields in existing rows before adding a new one.");
        return;
    }

    const row = $(`
<tr>
    <td>
        <select name="mode[]" class="modeSelect" required>
            <option value="">-- Select Mode --</option>
            <option value="issue">Issue New</option>
            <option value="existing">Manage Existing</option>
        </select>
    </td>
    <td><input name="gen_no[]" class="genInput"></td>
    <td><input name="name[]" class="nameInput"></td>
    <td class="loanIdCell"><span class="placeholder-text">Select Mode</span></td>
    <td>
        <select name="loan_type[]" class="loanType">
            <option value="">-- Select --</option>
            <option>MTL LOAN</option>
            <option>FDL LOAN</option>
            <option>KVP/NSC LOAN</option>
            <option>THRIFT FUNDS</option>
            <option>FIXED DEPOSITS</option>
            <option>WELFARE COLLECTIONS</option>
        </select>
    </td>
    <td><input name="amount[]" class="amount" value="0" readonly></td>
    <td><input name="cash[]" class="cash" value="0"></td>
    <td><input name="bank1[]" class="bank1" value="0"></td>
    <td><input name="bank2[]" class="bank2" value="0"></td>
    <td><input name="adj[]" class="adj" value="0"></td>
    <td><input name="date[]" type="date" value="${today()}"></td>
    <td><button type="button" class="btn-delete" onclick="$(this).closest('tr').remove()">🗑</button></td>
</tr>
`);

    row.find('.cash,.bank1,.bank2,.adj').on('input', () => recalcAmount(row));
    $('#paymentTable tbody').append(row);
    setupAutocomplete(row);

    row.find('.modeSelect').on('change', function () {
        const $cell = row.find('.loanIdCell');

        if (this.value === 'issue') {
            $cell.html(`<input name="loan_id[]" placeholder="Auto Generated (Optional)">`);
        } else if (this.value === 'existing') {
            $cell.html(`<select name="loan_id[]" class="loanSelect" required></select>`);
            loadActiveLoans(row);
        } else {
            $cell.html(`<span class="placeholder-text">Select Mode</span>`);
        }
    });
}

/* ================= INIT ================= */
$(document).ready(function () {
    addPaymentRow();   // ⬅ adds one empty row by default
});
</script>

{% endblock %}
