{% extends 'base.html' %}
{% load static %}

{% block title %}Add User{% endblock %}

{% block content %}
<div class="au-wrap">
  <div class="au-card">

    <div class="au-top">
      <h2>Add user</h2>
      <a href="{% url 'users' %}" class="au-users-btn">Users</a>
    </div>

    {% if messages %}
      {% for message in messages %}
        <div class="au-alert au-alert-{{ message.tags }}">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="post" action="{% url 'adduser' %}" id="add-user-form" novalidate>
      {% csrf_token %}

      <div class="au-field">
        <label for="name">Name</label>
        <input type="text" name="name" id="name" placeholder="Full name" required>
        <span class="au-err" id="name-error">Name is required</span>
      </div>

      <div class="au-row">
        <div class="au-field">
          <label for="mobile">Mobile <span class="au-opt">optional</span></label>
          <input type="tel" name="Mobile" id="mobile" placeholder="10-digit number" pattern="[0-9]{10}">
          <span class="au-err" id="mobile-error">Enter a valid 10-digit number</span>
        </div>

        <div class="au-field">
          <label for="code">Gen No <span class="au-opt">optional</span></label>
          <input type="text" name="code" id="code" placeholder="e.g. GEN-001">
        </div>
      </div>

      <div class="au-field">
        <label for="address">Address <span class="au-opt">optional</span></label>
        <textarea name="Address" id="address" placeholder="Street, city, state…"></textarea>
      </div>

      <hr class="au-divider">
      <button type="submit" class="au-submit">Submit</button>
    </form>

  </div>
</div>

<style>
*, *::before, *::after { box-sizing: border-box; }

.au-wrap {
  max-width: 620px;
  margin: 48px auto;
  padding: 0 16px;
}

.au-card {
  background: #ffffff;
  border: 0.5px solid #e5e7eb;
  border-radius: 12px;
  padding: 32px 36px 28px;
}

/* Header */
.au-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 28px;
}

.au-top h2 {
  font-size: 1.125rem;
  font-weight: 500;
  color: #111827;
  margin: 0;
}

.au-users-btn {
  background: #ecfdf5;
  color: #065f46;
  border: 0.5px solid #6ee7b7;
  font-size: 0.8125rem;
  font-weight: 500;
  padding: 6px 14px;
  border-radius: 8px;
  text-decoration: none;
  transition: opacity 0.15s;
}

.au-users-btn:hover { opacity: 0.8; }

/* Alerts */
.au-alert {
  padding: 10px 12px;
  border-radius: 8px;
  font-size: 0.8125rem;
  margin-bottom: 16px;
  border: 0.5px solid transparent;
}

.au-alert-success {
  background: #ecfdf5;
  color: #065f46;
  border-color: #6ee7b7;
}

.au-alert-error,
.au-alert-danger {
  background: #fef2f2;
  color: #991b1b;
  border-color: #fca5a5;
}

/* Two-column row */
.au-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

/* Fields */
.au-field { margin-bottom: 16px; }

.au-field label {
  display: block;
  font-size: 0.75rem;
  font-weight: 500;
  color: #6b7280;
  margin-bottom: 5px;
  letter-spacing: 0.03em;
  text-transform: uppercase;
}

.au-opt {
  font-size: 0.6875rem;
  font-weight: 400;
  color: #9ca3af;
  text-transform: none;
  letter-spacing: 0;
}

.au-field input,
.au-field textarea {
  width: 100%;
  padding: 10px 14px;
  font-size: 0.875rem;
  border: 0.5px solid #d1d5db;
  border-radius: 8px;
  background: #ffffff;
  color: #111827;
  outline: none;
  font-family: inherit;
  transition: border-color 0.15s, box-shadow 0.15s;
}

.au-field input:focus,
.au-field textarea:focus {
  border-color: #3b82f6;
  box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
}

.au-field textarea {
  resize: vertical;
  min-height: 80px;
  line-height: 1.5;
}

/* Error text */
.au-err {
  display: none;
  color: #dc2626;
  font-size: 0.75rem;
  margin-top: 4px;
}

/* Divider */
.au-divider {
  border: none;
  border-top: 0.5px solid #e5e7eb;
  margin: 22px 0;
}

/* Submit */
.au-submit {
  width: 100%;
  padding: 11px;
  background: #eff6ff;
  color: #1d4ed8;
  border: 0.5px solid #93c5fd;
  border-radius: 8px;
  font-size: 0.875rem;
  font-weight: 500;
  cursor: pointer;
  transition: opacity 0.15s;
  font-family: inherit;
}

.au-submit:hover { opacity: 0.85; }
.au-submit:active { transform: scale(0.99); }

@media (max-width: 540px) {
  .au-wrap { margin: 20px auto; }
  .au-card { padding: 20px; }
  .au-row { grid-template-columns: 1fr; gap: 0; }
}
</style>

<script>
document.getElementById('add-user-form').addEventListener('submit', function (e) {
  let valid = true;

  const name = document.getElementById('name');
  const nameErr = document.getElementById('name-error');
  nameErr.style.display = 'none';
  if (!name.value.trim()) {
    nameErr.style.display = 'block';
    valid = false;
  }

  const mobile = document.getElementById('mobile');
  const mobileErr = document.getElementById('mobile-error');
  mobileErr.style.display = 'none';
  if (mobile.value.trim() && !/^[0-9]{10}$/.test(mobile.value.trim())) {
    mobileErr.style.display = 'block';
    valid = false;
  }

  if (!valid) e.preventDefault();
});
</script>

{% endblock %}
